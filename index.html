<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ことわざタイピング練習</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      --bg: #111111;
      --panel: #1b1b1b;
      --panel2: #242424;
      --line: #3b3b3b;
      --text: #f2f2f2;
      --sub: #bdbdbd;
      --accent: #e5e5e5;
      --ok: #f2f2f2;
      --miss: #9f9f9f;
      background: var(--bg);
      color: var(--text);
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .theme-black {
      --bg: #0d0d0d;
      --panel: #171717;
      --panel2: #222222;
      --line: #343434;
      --text: #f5f5f5;
      --sub: #bababa;
      --accent: #ffffff;
      --ok: #f1f1f1;
      --miss: #8e8e8e;
    }
    .theme-white {
      --bg: #f7f7f7;
      --panel: #ffffff;
      --panel2: #f1f1f1;
      --line: #d4d4d4;
      --text: #1b1b1b;
      --sub: #585858;
      --accent: #000000;
      --ok: #111111;
      --miss: #8b8b8b;
    }
    .theme-gray {
      --bg: #676767;
      --panel: #747474;
      --panel2: #808080;
      --line: #9b9b9b;
      --text: #ffffff;
      --sub: #ededed;
      --accent: #ffffff;
      --ok: #ffffff;
      --miss: #dfdfdf;
    }

    body.font-gothic  { font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif; }
    body.font-mincho  { font-family: "Hiragino Mincho ProN", "Yu Mincho", "MS PMincho", serif; }
    body.font-rounded { font-family: "Hiragino Maru Gothic ProN", "Arial Rounded MT Bold", "Meiryo", sans-serif; }
    body.font-mono    { font-family: "SFMono-Regular", "Consolas", "Menlo", "Monaco", monospace; }
    body.font-classic { font-family: "BIZ UDPGothic", "Noto Sans JP", "Yu Gothic", sans-serif; }

    .app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: 10px;
    }

    .topbar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .control {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      min-height: 36px;
    }

    .control label {
      font-size: 11px;
      color: var(--sub);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .control select {
      appearance: none;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      min-width: 88px;
    }

    .stage {
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      align-items: start;
      justify-items: center;
      min-height: 0;
      gap: 10px;
      padding-top: 8px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--sub);
      letter-spacing: 0.06em;
    }

    .counter {
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
    }

    .main-display {
      width: min(1180px, 96vw);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 18px 18px 16px;
      display: grid;
      gap: 10px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset;
    }

    .jp {
      font-size: clamp(28px, 4.2vw, 54px);
      line-height: 1.3;
      text-align: center;
      letter-spacing: 0.03em;
      word-break: keep-all;
    }

    .roma {
      font-size: clamp(17px, 2vw, 24px);
      text-align: center;
      color: var(--sub);
      letter-spacing: 0.16em;
      word-break: break-all;
      min-height: 1.6em;
    }

    .typed {
      font-size: clamp(16px, 1.9vw, 22px);
      text-align: center;
      color: var(--ok);
      min-height: 1.5em;
      word-break: break-all;
      letter-spacing: 0.12em;
    }

    .typed .done {
      opacity: 1;
    }
    .typed .rest {
      opacity: 0.35;
    }

    .guide {
      font-size: 12px;
      color: var(--sub);
      text-align: center;
      letter-spacing: 0.05em;
    }

    .keyboard-wrap {
      width: min(1180px, 96vw);
      display: grid;
      gap: 8px;
    }

    .keyboard-title {
      text-align: center;
      font-size: 12px;
      color: var(--sub);
      letter-spacing: 0.08em;
    }

    .keyboard {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 14px;
      display: grid;
      gap: 8px;
    }

    .row {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: nowrap;
    }

    .key {
      width: min(6.2vw, 54px);
      height: min(6.2vw, 54px);
      min-width: 34px;
      min-height: 34px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--panel2);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(10px, 1vw, 13px);
      letter-spacing: 0.05em;
      user-select: none;
      transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }

    .key.wide  { width: min(10vw, 88px); }
    .key.wider { width: min(14vw, 126px); }
    .key.space { width: min(30vw, 340px); }

    .key.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      transform: translateY(-2px);
      font-weight: 700;
    }

    .bottom-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mini-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--sub);
    }

    .warning {
      color: var(--miss);
    }

    @media (max-width: 820px) {
      .app {
        padding: 8px;
        gap: 8px;
      }
      .main-display {
        padding: 14px 12px;
        border-radius: 20px;
      }
      .keyboard {
        padding: 10px 8px;
        border-radius: 18px;
      }
      .row { gap: 4px; }
      .key {
        border-radius: 10px;
        min-width: 28px;
        min-height: 28px;
      }
      .control {
        padding: 5px 8px;
        min-height: 32px;
      }
      .control select {
        min-width: 74px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body class="theme-black font-gothic">

    /****************************************************************
     * 1000問以上になるように拡張
     ****************************************************************/
    function buildQuestionBankTo1000(seedList) {
      const bank = [];
      let id = 1;
      while (bank.length < 1000) {
        for (const item of seedList) {
          if (bank.length >= 1000) break;
          bank.push({
            id: id++,
            jp: item.jp,
            kana: normalizeKana(item.kana)
          });
        }
      }
      return bank;
    }

      for (let i = 0; i < kana.length; i++) {
        const pair = kana.slice(i, i + 2);
        if (comboDisplayMap[pair]) {
          out += comboDisplayMap[pair];
          i++;
          continue;
        }
        const ch = kana[i];
        if (ch === "っ") {
          const nextPair = kana.slice(i + 1, i + 3);
          let nextDisplay = "";
          if (comboDisplayMap[nextPair]) {
            nextDisplay = comboDisplayMap[nextPair];
          } else {
            nextDisplay = displayMap[kana[i + 1]] || "";
          }
          out += nextDisplay ? nextDisplay[0] : "";
          continue;
        }
        out += displayMap[ch] || ch.toUpperCase();
      }
      return out;
    }

    function unique(arr) {
      return [...new Set(arr)];
    }

    /****************************************************************
     * 逐次判定用ローマ字解析
     * 以前の「全文候補を大量生成して件数制限する」方式をやめ、
     * 各かな単位ごとに状態を分岐保持して逐次判定する
     ****************************************************************/
    function parseKanaUnits(kana) {
      const units = [];
      for (let i = 0; i < kana.length; i++) {
        const pair = kana.slice(i, i + 2);
        if (comboRomaMap[pair] || comboDisplayMap[pair]) {
          units.push(pair);
          i++;
        } else {
          units.push(kana[i]);
        }
      }
      return units;
    }

    function getBaseRomaOptions(unit) {
      if (comboRomaMap[unit]) return comboRomaMap[unit];
      if (romaMap[unit]) return romaMap[unit];
      return [unit];
    }

    function getUnitHeadChars(unit, units, index) {
      const options = getUnitRomaOptions(units, index);
      return unique(
        options
          .map(v => v[0] || "")
          .filter(Boolean)
      );
    }

    function getSokuonHeadFromRoma(roma) {
      if (!roma) return "";
      const ch = roma[0];
      if (!/[a-z]/.test(ch)) return "";
      if ("aiueon".includes(ch)) return "";
      return ch;
    }

    function getUnitRomaOptions(units, index) {
      if (index >= units.length) return [""];

      const unit = units[index];

      if (unit === "っ") {
        if (index + 1 >= units.length) return [""];
        const nextOptions = getBaseRomaOptions(units[index + 1]);
        const heads = unique(
          nextOptions
            .map(getSokuonHeadFromRoma)
            .filter(Boolean)
        );
        return heads.length ? heads : [""];
      }

      if (unit === "ん") {
        if (index + 1 >= units.length) return ["n", "nn"];
        const nextHeads = getUnitHeadChars(units[index + 1], units, index + 1);
        const vowelOrYOrN = nextHeads.some(ch => "aiueoyn".includes(ch));
        if (vowelOrYOrN) {
          return ["nn", "n'"];
        }
        return ["n", "nn", "n'"];
      }

      return getBaseRomaOptions(unit);
    }

    function stateKey(state) {
      return `${state.unitIndex}|${state.typedInUnit}`;
    }

    function dedupeStates(states) {
      const map = new Map();
      for (const state of states) {
        map.set(stateKey(state), state);
      }
      return [...map.values()];
    }

    function createInitialStates() {
      return [{ unitIndex: 0, typedInUnit: "" }];
    }

    function advanceStates(states, inputChar, units) {
      const nextStates = [];

      for (const state of states) {
        if (state.unitIndex >= units.length) continue;

        const options = getUnitRomaOptions(units, state.unitIndex);

        for (const option of options) {
          if (!option.startsWith(state.typedInUnit)) continue;

          const nextTypedInUnit = state.typedInUnit + inputChar;

          if (!option.startsWith(nextTypedInUnit)) continue;

          nextStates.push({
            unitIndex: state.unitIndex,
            typedInUnit: nextTypedInUnit
          });

          if (option === nextTypedInUnit) {
            nextStates.push({
              unitIndex: state.unitIndex + 1,
              typedInUnit: ""
            });
          }
        }
      }

      return dedupeStates(nextStates);
    }

    function isSolved(states, units) {
      return states.some(state => state.unitIndex >= units.length);
    }

    function getNextPossibleChars(states, units) {
      const chars = [];

      for (const state of states) {
        if (state.unitIndex >= units.length) continue;

        const options = getUnitRomaOptions(units, state.unitIndex);
        for (const option of options) {
          if (!option.startsWith(state.typedInUnit)) continue;
          if (option.length > state.typedInUnit.length) {
            chars.push(option[state.typedInUnit.length]);
          }
        }
      }

      return unique(chars);
    }

    function shortestRemainingFromState(state, units, memo) {
      const key = `${state.unitIndex}|${state.typedInUnit}`;
      if (memo.has(key)) return memo.get(key);

      if (state.unitIndex >= units.length) {
        memo.set(key, "");
        return "";
      }

      const options = getUnitRomaOptions(units, state.unitIndex).filter(option => option.startsWith(state.typedInUnit));
      let best = null;

      for (const option of options) {
        let candidate = null;

        if (option === state.typedInUnit) {
          candidate = shortestRemainingFromState(
            { unitIndex: state.unitIndex + 1, typedInUnit: "" },
            units,
            memo
          );
        } else {
          candidate =
            option.slice(state.typedInUnit.length) +
            shortestRemainingFromState(
              { unitIndex: state.unitIndex + 1, typedInUnit: "" },
              units,
              memo
            );
        }

        if (best === null || candidate.length < best.length) {
          best = candidate;
        }
      }

      if (best === null) best = "";
      memo.set(key, best);
      return best;
    }

    function getBestDisplayTarget(typed, states, units) {
      const memo = new Map();
      let best = null;

      for (const state of states) {
        const rest = shortestRemainingFromState(state, units, memo);
        const candidate = typed + rest;
        if (best === null || candidate.length < best.length) {
          best = candidate;
        }
      }

      return best || typed;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    /****************************************************************
     * キー入力関連
     ****************************************************************/
    const jpText = document.getElementById("jpText");
    const romaText = document.getElementById("romaText");
    const typedText = document.getElementById("typedText");
    const counterEl = document.getElementById("counter");
    const remainingCountEl = document.getElementById("remainingCount");
    const statusText = document.getElementById("statusText");
    const themeSelect = document.getElementById("themeSelect");
    const fontSelect = document.getElementById("fontSelect");
    const soundSelect = document.getElementById("soundSelect");

    const keyEls = [...document.querySelectorAll(".key")];

    let audioCtx = null;
    let currentSound = "silent";

    let allQuestions = [...proverbBank];
    let remainingQuestions = [];
    let currentQuestion = null;
    let currentUnits = [];
    let parserStates = createInitialStates();
    let typed = "";
    let solvedCount = 1;
    let justLoaded = true;
    let solveTimer = null;

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function resetQuestionCycle(resetCounter = false) {
      if (solveTimer) {
        clearTimeout(solveTimer);
        solveTimer = null;
      }
      remainingQuestions = shuffle([...allQuestions]);
      if (resetCounter) solvedCount = 0;
      pickNextQuestion();
    }

    function pickNextQuestion() {
      if (solveTimer) {
        clearTimeout(solveTimer);
        solveTimer = null;
      }

      if (remainingQuestions.length === 0) {
        remainingQuestions = shuffle([...allQuestions]);
      }

      currentQuestion = remainingQuestions.pop();
      currentUnits = parseKanaUnits(currentQuestion.kana);
      parserStates = createInitialStates();
      typed = "";

      jpText.textContent = currentQuestion.jp;
      romaText.textContent = getDisplayRoman(currentQuestion.kana);
      updateTypedView();
      updateCounter();
      updateKeyboardGuide();

      statusText.textContent = justLoaded
        ? "初回の打鍵で音声が有効になります"
        : "入力受付中";

      justLoaded = false;
    }

    function updateCounter() {
      counterEl.textContent = String(solvedCount);
      remainingCountEl.textContent = String(remainingQuestions.length);
    }

    function updateTypedView() {
      const display = getBestDisplayTarget(typed, parserStates, currentUnits);
      const done = escapeHtml(typed.toUpperCase());
      const rest = escapeHtml(display.slice(typed.length).toUpperCase());
      typedText.innerHTML = `<span class="done">${done}</span><span class="rest">${rest}</span>`;
    }

    function updateKeyboardGuide() {
      keyEls.forEach(el => el.classList.remove("active"));

      const nextChars = getNextPossibleChars(parserStates, currentUnits);

      nextChars.forEach(ch => {
        if (ch === "'") return;
        if (ch === " ") {
          const el = document.querySelector('[data-key="space"]');
          if (el) el.classList.add("active");
          return;
        }
        const el = document.querySelector(`[data-key="${cssEscape(ch)}"]`);
        if (el) el.classList.add("active");
      });
    }

    function cssEscape(ch) {
      return ch.replace(/"/g, '\\"');
    }

    function flashMiss() {
      statusText.textContent = "ミスタイプ";
      setTimeout(() => {
        if (statusText.textContent === "ミスタイプ") {
          statusText.textContent = "入力受付中";
        }
      }, 120);
    }

    function handleTyping(inputChar) {
      const nextStates = advanceStates(parserStates, inputChar, currentUnits);

      if (nextStates.length === 0) {
        playMiss();
        flashMiss();
        return;
      }

      typed += inputChar;
      parserStates = nextStates;
      updateTypedView();
      updateKeyboardGuide();

      if (isSolved(parserStates, currentUnits)) {
        playHit();
        solveTimer = setTimeout(() => {
          solvedCount++;
          pickNextQuestion();
        }, 70);
      } else {
        playHit();
        statusText.textContent = "入力受付中";
      }
    }

    /****************************************************************
     * サウンド
     ****************************************************************/
    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function beep({ freq = 440, duration = 0.03, type = "square", gain = 0.03, attack = 0.002, release = 0.02 }) {
      if (currentSound === "silent") return;
      ensureAudio();

      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const amp = audioCtx.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);

      amp.gain.setValueAtTime(0.0001, now);
      amp.gain.exponentialRampToValueAtTime(Math.max(gain, 0.0002), now + attack);
      amp.gain.exponentialRampToValueAtTime(0.0001, now + Math.max(duration, attack + 0.001) + release);

      osc.connect(amp);
      amp.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + duration + release + 0.01);
    }

    function playHit() {
      switch (currentSound) {
        case "dry":
          beep({ freq: 1650, duration: 0.012, type: "square", gain: 0.02, attack: 0.001, release: 0.01 });
          break;
        case "deep":
          beep({ freq: 190, duration: 0.028, type: "triangle", gain: 0.035, attack: 0.001, release: 0.03 });
          break;
        case "mechanical":
          beep({ freq: 1200, duration: 0.008, type: "square", gain: 0.02, attack: 0.001, release: 0.008 });
          setTimeout(() => beep({ freq: 780, duration: 0.01, type: "square", gain: 0.015, attack: 0.001, release: 0.01 }), 6);
          break;
        case "soft":
          beep({ freq: 820, duration: 0.018, type: "sine", gain: 0.018, attack: 0.002, release: 0.02 });
          break;
        case "sharp":
          beep({ freq: 2100, duration: 0.007, type: "sawtooth", gain: 0.017, attack: 0.001, release: 0.008 });
          break;
      }
    }

    function playMiss() {
      if (currentSound === "silent") return;
      ensureAudio();
      beep({ freq: 180, duration: 0.04, type: "sawtooth", gain: 0.03, attack: 0.001, release: 0.03 });
    }

    /****************************************************************
     * UI設定
     ****************************************************************/
    function applyTheme(theme) {
      document.body.classList.remove("theme-black", "theme-white", "theme-gray");
      document.body.classList.add(theme);
      localStorage.setItem("typing_theme", theme);
    }

    function applyFont(font) {
      document.body.classList.remove("font-gothic", "font-mincho", "font-rounded", "font-mono", "font-classic");
      document.body.classList.add(font);
      localStorage.setItem("typing_font", font);
    }

    function applySound(sound) {
      currentSound = sound;
      localStorage.setItem("typing_sound", sound);
      statusText.textContent = sound === "silent"
        ? "音声はOFFです"
        : "入力受付中";
    }

    themeSelect.addEventListener("change", () => applyTheme(themeSelect.value));
    fontSelect.addEventListener("change", () => applyFont(fontSelect.value));
    soundSelect.addEventListener("change", () => applySound(soundSelect.value));

    /****************************************************************
     * キーボード入力
     ****************************************************************/
    window.addEventListener("keydown", (e) => {
      const key = e.key;

      if (["Tab", "Alt", "Control", "Meta", "Shift", "CapsLock"].includes(key)) return;

      if (key === "Enter") {
        e.preventDefault();
        resetQuestionCycle(true);
        return;
      }

      if (key === " ") {
        e.preventDefault();
        handleTyping(" ");
        return;
      }

      const lower = key.toLowerCase();

      if (/^[a-z\-']$/.test(lower)) {
        e.preventDefault();
        handleTyping(lower);
      }
    });

    /****************************************************************
     * 初期化
     ****************************************************************/
    function init() {
      const savedTheme = localStorage.getItem("typing_theme") || "theme-black";
      const savedFont = localStorage.getItem("typing_font") || "font-gothic";
      const savedSound = localStorage.getItem("typing_sound") || "silent";

      themeSelect.value = savedTheme;
      fontSelect.value = savedFont;
      soundSelect.value = savedSound;

      applyTheme(savedTheme);
      applyFont(savedFont);
      applySound(savedSound);

      resetQuestionCycle(false);
    }

    init();
  </script>
</body>
</html>
