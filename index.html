<html lang="ja">
<head>
  <meta charset="UTF-8" />

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      --bg: #111111;
      --panel: #1b1b1b;
      --panel2: #242424;
      --line: #3b3b3b;
      --text: #f2f2f2;
      --sub: #bdbdbd;
      --accent: #e5e5e5;
      --ok: #d84a4a;
      --miss: #9f9f9f;
      background: var(--bg);
      color: var(--text);
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .theme-black {
      --bg: #0d0d0d;
      --panel: #171717;
      --panel2: #222222;
      --line: #343434;
      --text: #f5f5f5;
      --sub: #bababa;
      --accent: #ffffff;
      --ok: #d84a4a;
      --miss: #8e8e8e;
    }
    .theme-white {
      --bg: #f7f7f7;
      --panel: #ffffff;
      --panel2: #f1f1f1;
      --line: #d4d4d4;
      --text: #1b1b1b;
      --sub: #585858;
      --accent: #000000;
      --ok: #c93a3a;
      --miss: #8b8b8b;
    }
    .theme-gray {
      --bg: #676767;
      --panel: #747474;
      --panel2: #808080;
      --line: #9b9b9b;
      --text: #ffffff;
      --sub: #ededed;
      --accent: #ffffff;
      --ok: #ff8080;
      --miss: #dfdfdf;
    }

    body.font-gothic  { font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif; }
    body.font-mincho  { font-family: "Hiragino Mincho ProN", "Yu Mincho", "MS PMincho", serif; }
    body.font-rounded { font-family: "Hiragino Maru Gothic ProN", "Arial Rounded MT Bold", "Meiryo", sans-serif; }
    body.font-mono    { font-family: "SFMono-Regular", "Consolas", "Menlo", "Monaco", monospace; }
    body.font-classic { font-family: "BIZ UDPGothic", "Noto Sans JP", "Yu Gothic", sans-serif; }

    .app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: 10px;
    }

    .topbar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .control {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      min-height: 36px;
    }

    .control label {
      font-size: 11px;
      color: var(--sub);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .control select {
      appearance: none;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      min-width: 88px;
    }

    .stage {
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      align-items: start;
      justify-items: center;
      min-height: 0;
      gap: 10px;
      padding-top: 8px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--sub);
      letter-spacing: 0.06em;
    }

    .counter {
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
    }

    .main-display {
      width: min(1180px, 96vw);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 18px 18px 16px;
      display: grid;
      gap: 10px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset;
    }

    .jp {
      font-size: clamp(28px, 4.2vw, 54px);
      line-height: 1.3;
      text-align: center;
      letter-spacing: 0.03em;
      word-break: break-word;
    }

    .roma {
      font-size: clamp(17px, 2vw, 24px);
      text-align: center;
      color: var(--sub);
      letter-spacing: 0.04em;
      word-break: break-word;
      min-height: 1.6em;
    }

    .typed {
      font-size: clamp(16px, 1.9vw, 22px);
      text-align: center;
      color: var(--text);
      min-height: 1.5em;
      word-break: break-all;
      letter-spacing: 0.12em;
    }

    .typed .done {
      opacity: 1;
      color: var(--ok);
    }
    .typed .rest {
      opacity: 0.35;
      color: var(--text);
    }

    .guide {
      font-size: 12px;
      color: var(--sub);
      text-align: center;
      letter-spacing: 0.05em;
    }

    .keyboard-wrap {
      width: min(1180px, 96vw);
      display: grid;
      gap: 8px;
    }

    .keyboard-title {
      text-align: center;
      font-size: 12px;
      color: var(--sub);
      letter-spacing: 0.08em;
    }

    .keyboard {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 14px;
      display: grid;
      gap: 8px;
    }

    .row {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: nowrap;
    }

    .key {
      width: min(6.2vw, 54px);
      height: min(6.2vw, 54px);
      min-width: 34px;
      min-height: 34px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--panel2);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(10px, 1vw, 13px);
      letter-spacing: 0.05em;
      user-select: none;
      transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }

    .key.wide  { width: min(10vw, 88px); }
    .key.wider { width: min(14vw, 126px); }
    .key.space { width: min(30vw, 340px); }

    .key.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      transform: translateY(-2px);
      font-weight: 700;
    }

    .bottom-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mini-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--sub);
    }

    .warning {
      color: var(--miss);
    }

    @media (max-width: 820px) {
      .app {
        padding: 8px;
        gap: 8px;
      }
      .main-display {
        padding: 14px 12px;
        border-radius: 20px;
      }
      .keyboard {
        padding: 10px 8px;
        border-radius: 18px;
      }
      .row { gap: 4px; }
      .key {
        border-radius: 10px;
        min-width: 28px;
        min-height: 28px;
      }
      .control {
        padding: 5px 8px;
        min-height: 32px;
      }
      .control select {
        min-width: 74px;
        font-size: 11px;
      }
    }
  </style>
</head>

    function buildQuestionBankTo500(seedList) {
      const bank = [];
      let id = 1;
      while (bank.length < 500) {
        for (const item of seedList) {
          if (bank.length >= 500) break;
          bank.push({
            id: id++,
            en: item.en.toLowerCase(),
            ja: item.ja
          });
        }
      }
      return bank;
    }

    const wordBank = buildQuestionBankTo500(wordSeeds);

    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    /****************************************************************
     * 要素取得
     ****************************************************************/
    const jpText = document.getElementById("jpText");
    const romaText = document.getElementById("romaText");
    const typedText = document.getElementById("typedText");
    const counterEl = document.getElementById("counter");
    const remainingCountEl = document.getElementById("remainingCount");
    const statusText = document.getElementById("statusText");
    const themeSelect = document.getElementById("themeSelect");
    const fontSelect = document.getElementById("fontSelect");
    const soundSelect = document.getElementById("soundSelect");
    const keyEls = [...document.querySelectorAll(".key")];

    let audioCtx = null;
    let currentSound = "calm";
    let remainingQuestions = [];
    let currentQuestion = null;
    let currentTarget = "";
    let typed = "";
    let solvedCount = 1;
    let justLoaded = true;
    let solveTimer = null;
    let speechEnabled = true;

    /****************************************************************
     * 出題管理
     ****************************************************************/
    function resetQuestionCycle(resetCounter = false) {
      if (solveTimer) {
        clearTimeout(solveTimer);
        solveTimer = null;
      }
      remainingQuestions = shuffle([...wordBank]);
      if (resetCounter) solvedCount = 0;
      pickNextQuestion();
    }

    function pickNextQuestion() {
      if (solveTimer) {
        clearTimeout(solveTimer);
        solveTimer = null;
      }

      if (remainingQuestions.length === 0) {
        remainingQuestions = shuffle([...wordBank]);
      }

      currentQuestion = remainingQuestions.pop();
      currentTarget = currentQuestion.en.toLowerCase();
      typed = "";

      jpText.textContent = currentQuestion.en.toUpperCase();
      romaText.textContent = currentQuestion.ja;
      updateTypedView();
      updateCounter();
      updateKeyboardGuide();

      statusText.textContent = justLoaded
        ? "初回の打鍵で音声が有効になります"
        : "入力受付中";

      speakCurrentWord();
      justLoaded = false;
    }

    function updateCounter() {
      counterEl.textContent = String(solvedCount);
      remainingCountEl.textContent = String(remainingQuestions.length);
    }

    function updateTypedView() {
      const done = escapeHtml(typed.toUpperCase());
      const rest = escapeHtml(currentTarget.slice(typed.length).toUpperCase());
      typedText.innerHTML = `<span class="done">${done}</span><span class="rest">${rest}</span>`;
    }

    function updateKeyboardGuide() {
      keyEls.forEach(el => el.classList.remove("active"));
      const nextChar = currentTarget[typed.length];
      if (!nextChar) return;
      const el = document.querySelector(`[data-key="${cssEscape(nextChar)}"]`);
      if (el) el.classList.add("active");
    }

    function cssEscape(ch) {
      return ch.replace(/"/g, '\\"');
    }

    function flashMiss() {
      statusText.textContent = "ミスタイプ";
      setTimeout(() => {
        if (statusText.textContent === "ミスタイプ") {
          statusText.textContent = "入力受付中";
        }
      }, 120);
    }

    function handleTyping(inputChar) {
      const expected = currentTarget[typed.length];
      if (!expected) return;

      if (inputChar !== expected) {
        flashMiss();
        return;
      }

      typed += inputChar;
      updateTypedView();
      updateKeyboardGuide();
      playHit();

      if (typed === currentTarget) {
        solveTimer = setTimeout(() => {
          solvedCount++;
          pickNextQuestion();
        }, 70);
      } else {
        statusText.textContent = "入力受付中";
      }
    }

    /****************************************************************
     * 読み上げ
     ****************************************************************/
    function speakCurrentWord() {
      if (!speechEnabled || !("speechSynthesis" in window)) return;

      try {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(currentQuestion.en);
        utterance.lang = "en-US";
        utterance.rate = 0.92;
        utterance.pitch = 1.0;
        utterance.volume = 0.9;
        window.speechSynthesis.speak(utterance);
      } catch (e) {
        // 読み上げ不可環境では何もしない
      }
    }

    function unlockSpeech() {
      if (!("speechSynthesis" in window)) return;
      try {
        const utterance = new SpeechSynthesisUtterance("");
        utterance.volume = 0;
        window.speechSynthesis.speak(utterance);
      } catch (e) {
        // 何もしない
      }
    }

    /****************************************************************
     * サウンド
     * 落ち着いたシンプルな1パターンのみ
     ****************************************************************/
    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function playHit() {
      ensureAudio();

      const now = audioCtx.currentTime;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      osc.type = "triangle";
      osc.frequency.setValueAtTime(780, now);
      osc.frequency.exponentialRampToValueAtTime(620, now + 0.028);

      filter.type = "lowpass";
      filter.frequency.setValueAtTime(1400, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.018, now + 0.003);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.04);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + 0.05);
    }

    /****************************************************************
     * UI設定
     ****************************************************************/
    function applyTheme(theme) {
      document.body.classList.remove("theme-black", "theme-white", "theme-gray");
      document.body.classList.add(theme);
      localStorage.setItem("typing_theme", theme);
    }

    function applyFont(font) {
      document.body.classList.remove("font-gothic", "font-mincho", "font-rounded", "font-mono", "font-classic");
      document.body.classList.add(font);
      localStorage.setItem("typing_font", font);
    }

    function applySound(sound) {
      currentSound = "calm";
      soundSelect.value = "calm";
      localStorage.setItem("typing_sound", "calm");
      statusText.textContent = "入力受付中";
    }

    themeSelect.addEventListener("change", () => applyTheme(themeSelect.value));
    fontSelect.addEventListener("change", () => applyFont(fontSelect.value));
    soundSelect.addEventListener("change", () => applySound(soundSelect.value));

    /****************************************************************
     * キーボード入力
     ****************************************************************/
    window.addEventListener("keydown", (e) => {
      const key = e.key;

      if (["Tab", "Alt", "Control", "Meta", "Shift", "CapsLock"].includes(key)) return;

      unlockSpeech();

      if (key === "Enter") {
        e.preventDefault();
        resetQuestionCycle(true);
        return;
      }

      if (key === " ") {
        e.preventDefault();
        return;
      }

      const lower = key.toLowerCase();

      if (/^[a-z]$/.test(lower)) {
        e.preventDefault();
        handleTyping(lower);
      }
    });

    window.addEventListener("pointerdown", unlockSpeech, { once: true });

    /****************************************************************
     * 初期化
     ****************************************************************/
    function init() {
      const savedTheme = localStorage.getItem("typing_theme") || "theme-black";
      const savedFont = localStorage.getItem("typing_font") || "font-gothic";

      themeSelect.value = savedTheme;
      fontSelect.value = savedFont;
      soundSelect.value = "calm";

      applyTheme(savedTheme);
      applyFont(savedFont);
      applySound("calm");

      resetQuestionCycle(false);
    }

    init();
