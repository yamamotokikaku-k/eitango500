<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>名詞タイピング練習</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      --bg: #111111;
      --panel: #1b1b1b;
      --panel2: #242424;
      --line: #3b3b3b;
      --text: #f2f2f2;
      --sub: #bdbdbd;
      --accent: #e5e5e5;
      --ok: #d84a4a;
      --miss: #9f9f9f;
      background: var(--bg);
      color: var(--text);
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .theme-black {
      --bg: #0d0d0d;
      --panel: #171717;
      --panel2: #222222;
      --line: #343434;
      --text: #f5f5f5;
      --sub: #bababa;
      --accent: #ffffff;
      --ok: #d84a4a;
      --miss: #8e8e8e;
    }
    .theme-white {
      --bg: #f7f7f7;
      --panel: #ffffff;
      --panel2: #f1f1f1;
      --line: #d4d4d4;
      --text: #1b1b1b;
      --sub: #585858;
      --accent: #000000;
      --ok: #c93a3a;
      --miss: #8b8b8b;
    }
    .theme-gray {
      --bg: #676767;
      --panel: #747474;
      --panel2: #808080;
      --line: #9b9b9b;
      --text: #ffffff;
      --sub: #ededed;
      --accent: #ffffff;
      --ok: #ff8080;
      --miss: #dfdfdf;
    }

    body.font-gothic  { font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif; }
    body.font-mincho  { font-family: "Hiragino Mincho ProN", "Yu Mincho", "MS PMincho", serif; }
    body.font-rounded { font-family: "Hiragino Maru Gothic ProN", "Arial Rounded MT Bold", "Meiryo", sans-serif; }
    body.font-mono    { font-family: "SFMono-Regular", "Consolas", "Menlo", "Monaco", monospace; }
    body.font-classic { font-family: "BIZ UDPGothic", "Noto Sans JP", "Yu Gothic", sans-serif; }

    .app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: 10px;
    }

    .topbar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .control {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      min-height: 36px;
    }

    .control label {
      font-size: 11px;
      color: var(--sub);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .control select {
      appearance: none;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      min-width: 88px;
    }

    .stage {
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      align-items: start;
      justify-items: center;
      min-height: 0;
      gap: 10px;
      padding-top: 8px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .badge {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--sub);
      letter-spacing: 0.06em;
    }

    .counter {
      color: var(--accent);
      font-weight: 700;
      font-size: 14px;
    }

    .main-display {
      width: min(1180px, 96vw);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 18px 18px 16px;
      display: grid;
      gap: 10px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.02) inset;
    }

    .jp {
      font-size: clamp(28px, 4.2vw, 54px);
      line-height: 1.3;
      text-align: center;
      letter-spacing: 0.03em;
      word-break: keep-all;
    }

    .roma {
      font-size: clamp(17px, 2vw, 24px);
      text-align: center;
      color: var(--sub);
      letter-spacing: 0.08em;
      word-break: break-all;
      min-height: 1.6em;
    }

    .typed {
      font-size: clamp(16px, 1.9vw, 22px);
      text-align: center;
      color: var(--text);
      min-height: 1.5em;
      word-break: break-all;
      letter-spacing: 0.12em;
    }

    .typed .done {
      opacity: 1;
      color: var(--ok);
    }
    .typed .rest {
      opacity: 0.35;
      color: var(--text);
    }

    .guide {
      font-size: 12px;
      color: var(--sub);
      text-align: center;
      letter-spacing: 0.05em;
    }

    .keyboard-wrap {
      width: min(1180px, 96vw);
      display: grid;
      gap: 8px;
    }

    .keyboard-title {
      text-align: center;
      font-size: 12px;
      color: var(--sub);
      letter-spacing: 0.08em;
    }

    .keyboard {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 14px;
      display: grid;
      gap: 8px;
    }

    .row {
      display: flex;
      justify-content: center;
      gap: 6px;
      flex-wrap: nowrap;
    }

    .key {
      width: min(6.2vw, 54px);
      height: min(6.2vw, 54px);
      min-width: 34px;
      min-height: 34px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--panel2);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(10px, 1vw, 13px);
      letter-spacing: 0.05em;
      user-select: none;
      transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
    }

    .key.wide  { width: min(10vw, 88px); }
    .key.wider { width: min(14vw, 126px); }
    .key.space { width: min(30vw, 340px); }

    .key.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      transform: translateY(-2px);
      font-weight: 700;
    }

    .bottom-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .mini-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--sub);
    }

    .warning {
      color: var(--miss);
    }

    @media (max-width: 820px) {
      .app {
        padding: 8px;
        gap: 8px;
      }
      .main-display {
        padding: 14px 12px;
        border-radius: 20px;
      }
      .keyboard {
        padding: 10px 8px;
        border-radius: 18px;
      }
      .row { gap: 4px; }
      .key {
        border-radius: 10px;
        min-width: 28px;
        min-height: 28px;
      }
      .control {
        padding: 5px 8px;
        min-height: 32px;
      }
      .control select {
        min-width: 74px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body class="theme-black font-gothic">
  <div class="app">
    <div class="topbar">
      <div class="control">
        <label for="themeSelect">COLOR</label>
        <select id="themeSelect">
          <option value="theme-black">BLACK</option>
          <option value="theme-white">WHITE</option>
          <option value="theme-gray">GRAY</option>
        </select>
      </div>

      <div class="control">
        <label for="fontSelect">FONT</label>
        <select id="fontSelect">
          <option value="font-gothic">GOTHIC</option>
          <option value="font-mincho">MINCHO</option>
          <option value="font-rounded">ROUNDED</option>
          <option value="font-mono">MONO</option>
          <option value="font-classic">CLASSIC</option>
        </select>
      </div>

      <div class="control">
        <label for="soundSelect">SOUND</label>
        <select id="soundSelect">
          <option value="calm">CALM</option>
        </select>
      </div>
    </div>

    <div class="stage">
      <div class="status-row">
        <div class="badge">問題数 <span id="counter" class="counter">1</span></div>
        <div class="badge">残り <span id="remainingCount">0</span></div>
        <div class="badge">ENTERでカウントを0にして最初から</div>
      </div>

      <div class="main-display">
        <div id="jpText" class="jp">読み込み中...</div>
        <div id="romaText" class="roma"></div>
        <div id="typedText" class="typed"></div>
        <div class="guide">入力欄は不要です。ページを開いた時点でそのまま打てます。</div>
      </div>

      <div class="keyboard-wrap">
        <div class="keyboard-title">KEYBOARD</div>
        <div class="keyboard" id="keyboard">
          <div class="row">
            <div class="key" data-key="1">1</div>
            <div class="key" data-key="2">2</div>
            <div class="key" data-key="3">3</div>
            <div class="key" data-key="4">4</div>
            <div class="key" data-key="5">5</div>
            <div class="key" data-key="6">6</div>
            <div class="key" data-key="7">7</div>
            <div class="key" data-key="8">8</div>
            <div class="key" data-key="9">9</div>
            <div class="key" data-key="0">0</div>
            <div class="key" data-key="-">-</div>
          </div>
          <div class="row">
            <div class="key" data-key="q">Q</div>
            <div class="key" data-key="w">W</div>
            <div class="key" data-key="e">E</div>
            <div class="key" data-key="r">R</div>
            <div class="key" data-key="t">T</div>
            <div class="key" data-key="y">Y</div>
            <div class="key" data-key="u">U</div>
            <div class="key" data-key="i">I</div>
            <div class="key" data-key="o">O</div>
            <div class="key" data-key="p">P</div>
          </div>
          <div class="row">
            <div class="key" data-key="a">A</div>
            <div class="key" data-key="s">S</div>
            <div class="key" data-key="d">D</div>
            <div class="key" data-key="f">F</div>
            <div class="key" data-key="g">G</div>
            <div class="key" data-key="h">H</div>
            <div class="key" data-key="j">J</div>
            <div class="key" data-key="k">K</div>
            <div class="key" data-key="l">L</div>
          </div>
          <div class="row">
            <div class="key" data-key="z">Z</div>
            <div class="key" data-key="x">X</div>
            <div class="key" data-key="c">C</div>
            <div class="key" data-key="v">V</div>
            <div class="key" data-key="b">B</div>
            <div class="key" data-key="n">N</div>
            <div class="key" data-key="m">M</div>
          </div>
          <div class="row">
            <div class="key wider" data-key="enter">ENTER</div>
            <div class="key space" data-key="space">SPACE</div>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom-bar">
      <div class="mini-panel">読み仮名表示 / 入力はヘボン式・訓令式・日本式対応</div>
      <div class="mini-panel warning" id="statusText">初回の打鍵で音声が有効になります</div>
    </div>
  </div>

  <script>
    /****************************************************************
     * 名詞データ
     * 3文字以上の名詞を1000問、順番に出題
     * 形式: { jp: "日本語表記", kana: "かなよみ" }
     ****************************************************************/
    const nounPrefixes = [
      { jp: "青空", kana: "あおぞら" },
      { jp: "白銀", kana: "はくぎん" },
      { jp: "黒曜", kana: "こくよう" },
      { jp: "春風", kana: "しゅんぷう" },
      { jp: "夏空", kana: "なつぞら" },
      { jp: "秋雨", kana: "あきさめ" },
      { jp: "冬灯", kana: "ふゆあかり" },
      { jp: "流星", kana: "りゅうせい" },
      { jp: "深海", kana: "しんかい" },
      { jp: "朝霧", kana: "あさぎり" },
      { jp: "夕凪", kana: "ゆうなぎ" },
      { jp: "月光", kana: "げっこう" },
      { jp: "星空", kana: "ほしぞら" },
      { jp: "花園", kana: "はなぞの" },
      { jp: "雪原", kana: "せつげん" },
      { jp: "森影", kana: "しんえい" },
      { jp: "海辺", kana: "うみべ" },
      { jp: "雲間", kana: "くもま" },
      { jp: "銀河", kana: "ぎんが" },
      { jp: "光彩", kana: "こうさい" },
      { jp: "音羽", kana: "おとは" },
      { jp: "風花", kana: "かざはな" },
      { jp: "水面", kana: "みなも" },
      { jp: "霧島", kana: "きりしま" },
      { jp: "空色", kana: "そらいろ" }
    ];

    const nounCores = [
      { jp: "時計", kana: "とけい" },
      { jp: "図書館", kana: "としょかん" },
      { jp: "飛行機", kana: "ひこうき" },
      { jp: "望遠鏡", kana: "ぼうえんきょう" },
      { jp: "博物館", kana: "はくぶつかん" },
      { jp: "美術館", kana: "びじゅつかん" },
      { jp: "映画館", kana: "えいがかん" },
      { jp: "遊園地", kana: "ゆうえんち" },
      { jp: "観覧車", kana: "かんらんしゃ" },
      { jp: "水族館", kana: "すいぞくかん" },
      { jp: "植物園", kana: "しょくぶつえん" },
      { jp: "動物園", kana: "どうぶつえん" },
      { jp: "電車駅", kana: "でんしゃえき" },
      { jp: "新幹線", kana: "しんかんせん" },
      { jp: "研究所", kana: "けんきゅうじょ" },
      { jp: "図工室", kana: "ずこうしつ" },
      { jp: "音楽室", kana: "おんがくしつ" },
      { jp: "理科室", kana: "りかしつ" },
      { jp: "教室棟", kana: "きょうしつとう" },
      { jp: "体育館", kana: "たいいくかん" },
      { jp: "競技場", kana: "きょうぎじょう" },
      { jp: "球場", kana: "きゅうじょう" },
      { jp: "温泉街", kana: "おんせんがい" },
      { jp: "商店街", kana: "しょうてんがい" },
      { jp: "展望台", kana: "てんぼうだい" },
      { jp: "放送局", kana: "ほうそうきょく" },
      { jp: "発電所", kana: "はつでんしょ" },
      { jp: "天文台", kana: "てんもんだい" },
      { jp: "灯台跡", kana: "とうだいあと" },
      { jp: "記念碑", kana: "きねんひ" },
      { jp: "遊歩道", kana: "ゆうほどう" },
      { jp: "交差点", kana: "こうさてん" },
      { jp: "郵便局", kana: "ゆうびんきょく" },
      { jp: "消防署", kana: "しょうぼうしょ" },
      { jp: "警察署", kana: "けいさつしょ" },
      { jp: "市場通", kana: "いちばどおり" },
      { jp: "古書店", kana: "こしょてん" },
      { jp: "喫茶店", kana: "きっさてん" },
      { jp: "書店街", kana: "しょてんがい" },
      { jp: "工房街", kana: "こうぼうがい" }
    ];

    function normalizeKana(text) {
      return text
        .replace(/\s+/g, "")
        .replace(/　/g, "")
        .replace(/ゔ/g, "ゔ");
    }

    function buildQuestionBankTo1000(prefixes, cores) {
      const bank = [];
      let id = 1;

      for (const prefix of prefixes) {
        for (const core of cores) {
          if (bank.length >= 1000) break;
          bank.push({
            id: id++,
            jp: prefix.jp + core.jp,
            kana: normalizeKana(prefix.kana + core.kana)
          });
        }
        if (bank.length >= 1000) break;
      }

      return bank;
    }

    const nounBank = buildQuestionBankTo1000(nounPrefixes, nounCores);

    /****************************************************************
     * 表示用かなはそのまま表示
     ****************************************************************/
    function getDisplayReading(kana) {
      return kana;
    }

    /****************************************************************
     * 入力受理用ローマ字候補
     * ヘボン式 / 訓令式 / 日本式 対応
     ****************************************************************/
    const romaMap = {
      "あ":["a"], "い":["i","yi"], "う":["u","wu"], "え":["e"], "お":["o"],
      "か":["ka","ca"], "き":["ki"], "く":["ku","cu","qu"], "け":["ke"], "こ":["ko","co"],
      "さ":["sa"], "し":["shi","si","ci"], "す":["su"], "せ":["se","ce"], "そ":["so"],
      "た":["ta"], "ち":["chi","ti"], "つ":["tsu","tu"], "て":["te"], "と":["to"],
      "な":["na"], "に":["ni"], "ぬ":["nu"], "ね":["ne"], "の":["no"],
      "は":["ha"], "ひ":["hi"], "ふ":["fu","hu"], "へ":["he"], "ほ":["ho"],
      "ま":["ma"], "み":["mi"], "む":["mu"], "め":["me"], "も":["mo"],
      "や":["ya"], "ゆ":["yu"], "よ":["yo"],
      "ら":["ra"], "り":["ri"], "る":["ru"], "れ":["re"], "ろ":["ro"],
      "わ":["wa"], "を":["wo","o"], "ん":["n","nn"],
      "が":["ga"], "ぎ":["gi"], "ぐ":["gu"], "げ":["ge"], "ご":["go"],
      "ざ":["za"], "じ":["ji","zi"], "ず":["zu"], "ぜ":["ze"], "ぞ":["zo"],
      "だ":["da"], "ぢ":["di","ji","zi"], "づ":["du","zu"], "で":["de"], "ど":["do"],
      "ば":["ba"], "び":["bi"], "ぶ":["bu"], "べ":["be"], "ぼ":["bo"],
      "ぱ":["pa"], "ぴ":["pi"], "ぷ":["pu"], "ぺ":["pe"], "ぽ":["po"],
      "ぁ":["la","xa"], "ぃ":["li","xi"], "ぅ":["lu","xu"], "ぇ":["le","xe"], "ぉ":["lo","xo"],
      "ゃ":["lya","xya"], "ゅ":["lyu","xyu"], "ょ":["lyo","xyo"],
      "ゎ":["lwa","xwa"], "ゔ":["vu"], "ー":["-"]
    };

    const comboRomaMap = {
      "きゃ":["kya"], "きゅ":["kyu"], "きょ":["kyo"],
      "しゃ":["sha","sya"], "しゅ":["shu","syu"], "しょ":["sho","syo"],
      "ちゃ":["cha","cya","tya"], "ちゅ":["chu","cyu","tyu"], "ちょ":["cho","cyo","tyo"],
      "にゃ":["nya"], "にゅ":["nyu"], "にょ":["nyo"],
      "ひゃ":["hya"], "ひゅ":["hyu"], "ひょ":["hyo"],
      "みゃ":["mya"], "みゅ":["myu"], "みょ":["myo"],
      "りゃ":["rya"], "りゅ":["ryu"], "りょ":["ryo"],
      "ぎゃ":["gya"], "ぎゅ":["gyu"], "ぎょ":["gyo"],
      "じゃ":["ja","jya","zya"], "じゅ":["ju","jyu","zyu"], "じょ":["jo","jyo","zyo"],
      "ぢゃ":["dya","ja","jya"], "ぢゅ":["dyu","ju","jyu"], "ぢょ":["dyo","jo","jyo"],
      "びゃ":["bya"], "びゅ":["byu"], "びょ":["byo"],
      "ぴゃ":["pya"], "ぴゅ":["pyu"], "ぴょ":["pyo"],
      "てぃ":["thi","ti"], "でぃ":["dhi","di"],
      "とぅ":["twu","tu"], "どぅ":["dwu","du"],
      "ふぁ":["fa","hua"], "ふぃ":["fi","hwi"], "ふぇ":["fe","hwe"], "ふぉ":["fo","hwo"]
    };

    function unique(arr) {
      return [...new Set(arr)];
    }

    /****************************************************************
     * 逐次判定用ローマ字解析
     ****************************************************************/
    function parseKanaUnits(kana) {
      const units = [];
      for (let i = 0; i < kana.length; i++) {
        const pair = kana.slice(i, i + 2);
        if (comboRomaMap[pair]) {
          units.push(pair);
          i++;
        } else {
          units.push(kana[i]);
        }
      }
      return units;
    }

    function getBaseRomaOptions(unit) {
      if (comboRomaMap[unit]) return comboRomaMap[unit];
      if (romaMap[unit]) return romaMap[unit];
      return [unit];
    }

    function getUnitHeadChars(unit, units, index) {
      const options = getUnitRomaOptions(units, index);
      return unique(
        options
          .map(v => v[0] || "")
          .filter(Boolean)
      );
    }

    function getSokuonHeadFromRoma(roma) {
      if (!roma) return "";
      const ch = roma[0];
      if (!/[a-z]/.test(ch)) return "";
      if ("aiueon".includes(ch)) return "";
      return ch;
    }

    function getUnitRomaOptions(units, index) {
      if (index >= units.length) return [""];

      const unit = units[index];

      if (unit === "っ") {
        if (index + 1 >= units.length) return [""];
        const nextOptions = getBaseRomaOptions(units[index + 1]);
        const heads = unique(
          nextOptions
            .map(getSokuonHeadFromRoma)
            .filter(Boolean)
        );
        return heads.length ? heads : [""];
      }

      if (unit === "ん") {
        if (index + 1 >= units.length) return ["n", "nn"];
        const nextHeads = getUnitHeadChars(units[index + 1], units, index + 1);
        const vowelOrYOrN = nextHeads.some(ch => "aiueoyn".includes(ch));
        if (vowelOrYOrN) {
          return ["nn", "n'"];
        }
        return ["n", "nn", "n'"];
      }

      return getBaseRomaOptions(unit);
    }

    function stateKey(state) {
      return `${state.unitIndex}|${state.typedInUnit}`;
    }

    function dedupeStates(states) {
      const map = new Map();
      for (const state of states) {
        map.set(stateKey(state), state);
      }
      return [...map.values()];
    }

    function createInitialStates() {
      return [{ unitIndex: 0, typedInUnit: "" }];
    }

    function advanceStates(states, inputChar, units) {
      const nextStates = [];

      for (const state of states) {
        if (state.unitIndex >= units.length) continue;

        const options = getUnitRomaOptions(units, state.unitIndex);

        for (const option of options) {
          if (!option.startsWith(state.typedInUnit)) continue;

          const nextTypedInUnit = state.typedInUnit + inputChar;

          if (!option.startsWith(nextTypedInUnit)) continue;

          nextStates.push({
            unitIndex: state.unitIndex,
            typedInUnit: nextTypedInUnit
          });

          if (option === nextTypedInUnit) {
            nextStates.push({
              unitIndex: state.unitIndex + 1,
              typedInUnit: ""
            });
          }
        }
      }

      return dedupeStates(nextStates);
    }

    function isSolved(states, units) {
      return states.some(state => state.unitIndex >= units.length);
    }

    function getNextPossibleChars(states, units) {
      const chars = [];

      for (const state of states) {
        if (state.unitIndex >= units.length) continue;

        const options = getUnitRomaOptions(units, state.unitIndex);
        for (const option of options) {
          if (!option.startsWith(state.typedInUnit)) continue;
          if (option.length > state.typedInUnit.length) {
            chars.push(option[state.typedInUnit.length]);
          }
        }
      }

      return unique(chars);
    }

    function shortestRemainingFromState(state, units, memo) {
      const key = `${state.unitIndex}|${state.typedInUnit}`;
      if (memo.has(key)) return memo.get(key);

      if (state.unitIndex >= units.length) {
        memo.set(key, "");
        return "";
      }

      const options = getUnitRomaOptions(units, state.unitIndex).filter(option => option.startsWith(state.typedInUnit));
      let best = null;

      for (const option of options) {
        let candidate = null;

        if (option === state.typedInUnit) {
          candidate = shortestRemainingFromState(
            { unitIndex: state.unitIndex + 1, typedInUnit: "" },
            units,
            memo
          );
        } else {
          candidate =
            option.slice(state.typedInUnit.length) +
            shortestRemainingFromState(
              { unitIndex: state.unitIndex + 1, typedInUnit: "" },
              units,
              memo
            );
        }

        if (best === null || candidate.length < best.length) {
          best = candidate;
        }
      }

      if (best === null) best = "";
      memo.set(key, best);
      return best;
    }

    function getBestDisplayTarget(typed, states, units) {
      const memo = new Map();
      let best = null;

      for (const state of states) {
        const rest = shortestRemainingFromState(state, units, memo);
        const candidate = typed + rest;
        if (best === null || candidate.length < best.length) {
          best = candidate;
        }
      }

      return best || typed;
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    /****************************************************************
     * キー入力関連
     ****************************************************************/
    const jpText = document.getElementById("jpText");
    const romaText = document.getElementById("romaText");
    const typedText = document.getElementById("typedText");
    const counterEl = document.getElementById("counter");
    const remainingCountEl = document.getElementById("remainingCount");
    const statusText = document.getElementById("statusText");
    const themeSelect = document.getElementById("themeSelect");
    const fontSelect = document.getElementById("fontSelect");
    const soundSelect = document.getElementById("soundSelect");

    const keyEls = [...document.querySelectorAll(".key")];

    let audioCtx = null;
    let currentSound = "calm";

    let allQuestions = [...nounBank];
    let currentQuestionIndex = 0;
    let currentQuestion = null;
    let currentUnits = [];
    let parserStates = createInitialStates();
    let typed = "";
    let solvedCount = 1;
    let justLoaded = true;
    let solveTimer = null;

    function resetQuestionCycle(resetCounter = false) {
      if (solveTimer) {
        clearTimeout(solveTimer);
        solveTimer = null;
      }
      currentQuestionIndex = 0;
      if (resetCounter) solvedCount = 0;
      pickCurrentQuestion();
    }

    function pickCurrentQuestion() {
      if (solveTimer) {
        clearTimeout(solveTimer);
        solveTimer = null;
      }

      if (currentQuestionIndex >= allQuestions.length) {
        currentQuestionIndex = 0;
      }

      currentQuestion = allQuestions[currentQuestionIndex];
      currentUnits = parseKanaUnits(currentQuestion.kana);
      parserStates = createInitialStates();
      typed = "";

      jpText.textContent = currentQuestion.jp;
      romaText.textContent = getDisplayReading(currentQuestion.kana);
      updateTypedView();
      updateCounter();
      updateKeyboardGuide();

      statusText.textContent = justLoaded
        ? "初回の打鍵で音声が有効になります"
        : "入力受付中";

      justLoaded = false;
    }

    function updateCounter() {
      counterEl.textContent = String(solvedCount);
      remainingCountEl.textContent = String(Math.max(0, allQuestions.length - currentQuestionIndex - 1));
    }

    function updateTypedView() {
      const display = getBestDisplayTarget(typed, parserStates, currentUnits);
      const done = escapeHtml(typed.toUpperCase());
      const rest = escapeHtml(display.slice(typed.length).toUpperCase());
      typedText.innerHTML = `<span class="done">${done}</span><span class="rest">${rest}</span>`;
    }

    function updateKeyboardGuide() {
      keyEls.forEach(el => el.classList.remove("active"));

      const nextChars = getNextPossibleChars(parserStates, currentUnits);

      nextChars.forEach(ch => {
        if (ch === "'") return;
        if (ch === " ") {
          const el = document.querySelector('[data-key="space"]');
          if (el) el.classList.add("active");
          return;
        }
        const el = document.querySelector(`[data-key="${cssEscape(ch)}"]`);
        if (el) el.classList.add("active");
      });
    }

    function cssEscape(ch) {
      return ch.replace(/"/g, '\\"');
    }

    function flashMiss() {
      statusText.textContent = "ミスタイプ";
      setTimeout(() => {
        if (statusText.textContent === "ミスタイプ") {
          statusText.textContent = "入力受付中";
        }
      }, 120);
    }

    function handleTyping(inputChar) {
      const nextStates = advanceStates(parserStates, inputChar, currentUnits);

      if (nextStates.length === 0) {
        flashMiss();
        return;
      }

      typed += inputChar;
      parserStates = nextStates;
      updateTypedView();
      updateKeyboardGuide();

      playHit();

      if (isSolved(parserStates, currentUnits)) {
        solveTimer = setTimeout(() => {
          solvedCount++;
          currentQuestionIndex++;
          if (currentQuestionIndex >= allQuestions.length) {
            currentQuestionIndex = 0;
          }
          pickCurrentQuestion();
        }, 70);
      } else {
        statusText.textContent = "入力受付中";
      }
    }

    /****************************************************************
     * サウンド
     * 落ち着いたシンプルな1パターンのみ
     ****************************************************************/
    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function playHit() {
      ensureAudio();

      const now = audioCtx.currentTime;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();

      osc.type = "triangle";
      osc.frequency.setValueAtTime(780, now);
      osc.frequency.exponentialRampToValueAtTime(620, now + 0.028);

      filter.type = "lowpass";
      filter.frequency.setValueAtTime(1400, now);

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.018, now + 0.003);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.04);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(now);
      osc.stop(now + 0.05);
    }

    /****************************************************************
     * UI設定
     ****************************************************************/
    function applyTheme(theme) {
      document.body.classList.remove("theme-black", "theme-white", "theme-gray");
      document.body.classList.add(theme);
      localStorage.setItem("typing_theme", theme);
    }

    function applyFont(font) {
      document.body.classList.remove("font-gothic", "font-mincho", "font-rounded", "font-mono", "font-classic");
      document.body.classList.add(font);
      localStorage.setItem("typing_font", font);
    }

    function applySound(sound) {
      currentSound = "calm";
      soundSelect.value = "calm";
      localStorage.setItem("typing_sound", "calm");
      statusText.textContent = "入力受付中";
    }

    themeSelect.addEventListener("change", () => applyTheme(themeSelect.value));
    fontSelect.addEventListener("change", () => applyFont(fontSelect.value));
    soundSelect.addEventListener("change", () => applySound(soundSelect.value));

    /****************************************************************
     * キーボード入力
     ****************************************************************/
    window.addEventListener("keydown", (e) => {
      const key = e.key;

      if (["Tab", "Alt", "Control", "Meta", "Shift", "CapsLock"].includes(key)) return;

      if (key === "Enter") {
        e.preventDefault();
        resetQuestionCycle(true);
        return;
      }

      if (key === " ") {
        e.preventDefault();
        handleTyping(" ");
        return;
      }

      const lower = key.toLowerCase();

      if (/^[a-z\-']$/.test(lower)) {
        e.preventDefault();
        handleTyping(lower);
      }
    });

    /****************************************************************
     * 初期化
     ****************************************************************/
    function init() {
      const savedTheme = localStorage.getItem("typing_theme") || "theme-black";
      const savedFont = localStorage.getItem("typing_font") || "font-gothic";

      themeSelect.value = savedTheme;
      fontSelect.value = savedFont;
      soundSelect.value = "calm";

      applyTheme(savedTheme);
      applyFont(savedFont);
      applySound("calm");

      resetQuestionCycle(false);
    }

    init();
  </script>
</body>
</html>
